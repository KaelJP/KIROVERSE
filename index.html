        // Manages screen shake, tumble rotation, white flash, and
        // score popups. All timing from GAME_CONFIG.rendering.
        // Requirements: 4.9, 4.10, 4.11, 4.12, 5.2
        // ============================================================

        class EffectsManager {
            /**
             * @param {typeof GAME_CONFIG.rendering} config - Rendering configuration object
             */
            constructor(config) {
                this.config = config;

                // Screen shake state
                this.shake = {
                    active: false,
                    amplitude: config.screenShakeAmplitude,
                    duration: config.screenShakeDuration,
                    elapsed: 0
                };

                // Tumble animation state
                this.tumble = {
                    active: false,
                    rotation: 0,
                    duration: config.tumbleDuration,
                    elapsed: 0
                };

                // White flash state
                this.flash = {
                    active: false,
                    opacity: config.whiteFlashOpacity,
                    duration: config.whiteFlashDuration,
                    elapsed: 0
                };

                // Score popups array
                this.popups = [];
            }

            // --- Screen Shake ---

            /**
             * Activate the screen shake effect.
             */
            triggerShake() {
                this.shake.active = true;
                this.shake.elapsed = 0;
            }

            /**
             * Update shake timer. Deactivates when duration is exceeded.
             * @param {number} dt - Delta time in seconds
             */
            updateShake(dt) {
                if (!this.shake.active) return;
                this.shake.elapsed += dt * 1000;
                if (this.shake.elapsed >= this.shake.duration) {
                    this.shake.active = false;
                    this.shake.elapsed = 0;
                }
            }

            /**
             * Get the current shake offset for rendering displacement.
             * Returns random x/y within amplitude if active, otherwise {x:0, y:0}.
             * @returns {{x: number, y: number}}
             */
            getShakeOffset() {
                if (!this.shake.active) {
                    return { x: 0, y: 0 };
                }
                const amp = this.shake.amplitude;
                return {
                    x: (Math.random() * 2 - 1) * amp,
                    y: (Math.random() * 2 - 1) * amp
                };
            }

            // --- Tumble Animation ---

            /**
             * Activate the tumble rotation effect.
             */
            triggerTumble() {
                this.tumble.active = true;
                this.tumble.rotation = 0;
                this.tumble.elapsed = 0;
            }

            /**
             * Update tumble timer and compute current rotation.
             * Deactivates when duration is exceeded.
             * @param {number} dt - Delta time in seconds
             */
            updateTumble(dt) {
                if (!this.tumble.active) return;
                this.tumble.elapsed += dt * 1000;
                if (this.tumble.elapsed >= this.tumble.duration) {
                    this.tumble.active = false;
                    this.tumble.rotation = this.config.tumbleRotation;
                } else {
                    this.tumble.rotation = (this.tumble.elapsed / this.tumble.duration) * this.config.tumbleRotation;
                }
            }

            /**
             * Get the current tumble rotation in degrees.
             * @returns {number} Rotation degrees (0 to 360)
             */
            getTumbleRotation() {
                return this.tumble.rotation;
            }

            // --- White Flash ---

            /**
             * Activate the white flash overlay effect.
             */
            triggerFlash() {
                this.flash.active = true;
                this.flash.opacity = this.config.whiteFlashOpacity;
                this.flash.elapsed = 0;
            }

            /**
             * Update flash timer and fade opacity. Deactivates when duration is exceeded.
             * @param {number} dt - Delta time in seconds
             */
            updateFlash(dt) {
                if (!this.flash.active) return;
                this.flash.elapsed += dt * 1000;
                if (this.flash.elapsed >= this.flash.duration) {
                    this.flash.active = false;
                    this.flash.opacity = 0;
                } else {
                    // Fade from initial opacity to 0 over duration
                    this.flash.opacity = this.config.whiteFlashOpacity * (1 - this.flash.elapsed / this.flash.duration);
                }
            }

            /**
             * Render the white flash overlay on the canvas if active.
             * @param {CanvasRenderingContext2D} ctx - The canvas 2D context
             */
            renderFlash(ctx) {
                if (!this.flash.active) return;
                ctx.save();
                ctx.globalAlpha = this.flash.opacity;
                ctx.fillStyle = 'rgba(255, 255, 255, 1)';
                ctx.fillRect(0, 0, GAME_CONFIG.canvas.width, GAME_CONFIG.canvas.height);
                ctx.restore();
            }

            // --- Score Popups ---

            /**
             * Add a new score popup at the given position.
             * @param {number} x - X position for the popup
             * @param {number} y - Y position for the popup
             */
            addPopup(x, y) {
                this.popups.push({
                    x: x,
                    y: y,
                    opacity: 1,
                    offsetY: 0,
                    lifetime: this.config.scorePopupDuration,
                    elapsed: 0
                });
            }

            /**
             * Update all score popups: advance elapsed, compute opacity fade and rise offset.
             * Removes expired popups.
             * @param {number} dt - Delta time in seconds
             */
            updatePopups(dt) {
                const dtMs = dt * 1000;

                for (let i = this.popups.length - 1; i >= 0; i--) {
                    const popup = this.popups[i];
                    popup.elapsed += dtMs;

                    if (popup.elapsed >= popup.lifetime) {
                        this.popups.splice(i, 1);
                    } else {
                        const progress = popup.elapsed / popup.lifetime;
                        popup.opacity = 1 - progress;
                        popup.offsetY = progress * this.config.scorePopupRise;
                    }
                }
            }

            /**
             * Render all active score popups as "+1" text with fading and rising.
             * @param {CanvasRenderingContext2D} ctx - The canvas 2D context
             */
            renderPopups(ctx) {
                for (let i = 0; i < this.popups.length; i++) {
                    const popup = this.popups[i];
                    ctx.save();
                    ctx.globalAlpha = popup.opacity;
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = 'bold 18px Arial, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    const drawY = popup.y - popup.offsetY;
                    ctx.strokeText('+1', popup.x, drawY);
                    ctx.fillText('+1', popup.x, drawY);
                    ctx.restore();
                }
            }

            // --- Combined Methods ---

            /**
             * Update all effects in a single call.
             * @param {number} dt - Delta time in seconds
             */
            update(dt) {
                this.updateShake(dt);
                this.updateTumble(dt);
                this.updateFlash(dt);
                this.updatePopups(dt);
            }

            /**
             * Trigger all game-over effects at once: shake, tumble, and flash.
             */
            triggerGameOver() {
                this.triggerShake();
                this.triggerTumble();
                this.triggerFlash();
            }

            /**
             * Reset all effects to inactive state and clear popups.
             */
            reset() {
                this.shake.active = false;
                this.shake.elapsed = 0;

                this.tumble.active = false;
                this.tumble.rotation = 0;
                this.tumble.elapsed = 0;

                this.flash.active = false;
                this.flash.opacity = 0;
                this.flash.elapsed = 0;

                this.popups = [];
            }
        }

        // ============================================================
        // CloudSystem - Parallax Background Clouds
        // Decorative semi-transparent clouds at multiple depth layers.
        // Scrolls during Menu, Ready, and Playing states for ambient motion.
        // Requirements: 8.6, 8.7, 8.8, 8.9
        // ============================================================

        class CloudSystem {
            /**
             * @param {typeof GAME_CONFIG.clouds} config - Cloud configuration object
             */
            constructor(config) {
                this.config = config;
                this.clouds = [];
                this._canvasWidth = GAME_CONFIG.canvas.width;
                this._canvasHeight = GAME_CONFIG.canvas.height;

                // Initialize 6-9 clouds across 3 layers (2-3 per layer)
                this._initializeClouds();
            }

            /**
             * Initialize clouds spread across all depth layers.
             * Creates 2-3 clouds per layer, distributed across the canvas width.
             * @private
             */
            _initializeClouds() {
                this.clouds = [];

                for (let layer = 0; layer < this.config.layerCount; layer++) {
                    // 2-3 clouds per layer
                    const count = 2 + Math.floor(Math.random() * 2);
                    for (let i = 0; i < count; i++) {
                        const cloud = this.spawnCloud(layer);
                        // Distribute across the full canvas width for initial placement
                        cloud.x = Math.random() * this._canvasWidth;
                        this.clouds.push(cloud);
                    }
                }
            }

            /**
             * Create a new cloud object for the given depth layer.
             * @param {number} layer - Depth layer index (0 = farthest, layerCount-1 = nearest)
             * @returns {{ x: number, y: number, width: number, height: number, layer: number, opacity: number, speedFactor: number }}
             */
            spawnCloud(layer) {
                const config = this.config;
                const x = this._canvasWidth + Math.random() * 100;
                const y = Math.random() * (this._canvasHeight * config.spawnRegionFraction);
                const width = 60 + Math.random() * 60;   // 60-120px
                const height = 20 + Math.random() * 20;  // 20-40px
                const opacity = config.minOpacity + Math.random() * (config.maxOpacity - config.minOpacity);
                const speedFactor = config.speedFactors[layer];

                return { x, y, width, height, layer, opacity, speedFactor };
            }

            /**
             * Update cloud positions. Scrolls each cloud left based on wallSpeed and its speedFactor.
             * When a cloud scrolls off the left edge, respawn at the right with a random offset.
             * @param {number} dt - Delta time in seconds
             * @param {number} wallSpeed - Current wall scroll speed in px/s
             */
            update(dt, wallSpeed) {
                for (let i = 0; i < this.clouds.length; i++) {
                    const cloud = this.clouds[i];
                    cloud.x -= wallSpeed * cloud.speedFactor * dt;

                    // If cloud has scrolled completely off the left edge, respawn at the right
                    if (cloud.x + cloud.width < 0) {
                        cloud.x = this._canvasWidth + Math.random() * 100;
                        cloud.y = Math.random() * (this._canvasHeight * this.config.spawnRegionFraction);
                        cloud.width = 60 + Math.random() * 60;
                        cloud.height = 20 + Math.random() * 20;
                        cloud.opacity = this.config.minOpacity + Math.random() * (this.config.maxOpacity - this.config.minOpacity);
                    }
                }
            }

            /**
             * Render all clouds as semi-transparent white ellipses.
             * Uses a single fillStyle and varies globalAlpha per cloud.
             * @param {CanvasRenderingContext2D} ctx - Canvas rendering context
             */
            render(ctx) {
                ctx.fillStyle = '#FFFFFF';

                for (let i = 0; i < this.clouds.length; i++) {
                    const cloud = this.clouds[i];
                    ctx.globalAlpha = cloud.opacity;
                    ctx.beginPath();
                    ctx.ellipse(
                        cloud.x + cloud.width / 2,
                        cloud.y + cloud.height / 2,
                        cloud.width / 2,
                        cloud.height / 2,
                        0, 0, Math.PI * 2
                    );
                    ctx.fill();
                }

                // Reset globalAlpha to default
                ctx.globalAlpha = 1.0;
            }

            /**
             * Reset all clouds to new random positions (used on game restart).
             */
            reset() {
                this.clouds = [];
                this._initializeClouds();
            }
        }

        // ============================================================
        // Renderer - Batched Draw Pipeline
        // Handles all Canvas drawing with batched draw calls grouped
        // by type. Minimizes ctx.save()/ctx.restore() and state changes.
        // Render order: background → clouds → walls → score bubbles →
        //   ghosty → particles → popups → HUD
        // Requirements: 8.1, 8.2, 8.3, 8.4, 11.5, 11.6
        // ============================================================

        class Renderer {
            /**
             * @param {CanvasRenderingContext2D} ctx - Canvas 2D rendering context
             * @param {typeof GAME_CONFIG.rendering} config - Rendering configuration object
             */
            constructor(ctx, config) {
                this.ctx = ctx;
                this.config = config;
                this.canvasWidth = GAME_CONFIG.canvas.width;
                this.canvasHeight = GAME_CONFIG.canvas.height;
                
                // Load coin sprite
                this.coinSpriteLoaded = false;
                this.coinSprite = new Image();
                this.coinSprite.onload = () => { this.coinSpriteLoaded = true; };
                this.coinSprite.src = 'assets/ghostly_coin.png';
            }

            /**
             * Main render method called each frame with all game state.
             * Dispatches to sub-methods in the correct pipeline order.
             * @param {object} state - All game state needed for rendering
             * @param {object} state.ghosty - Ghosty instance
             * @param {object} state.wallManager - WallManager instance
             * @param {object} state.cloudSystem - CloudSystem instance (may be null)
             * @param {object} state.particleSystem - ParticleSystem instance (may be null)
             * @param {object} state.effectsManager - EffectsManager instance (may be null)
             * @param {object} state.scoreManager - ScoreManager instance
             * @param {object} state.physics - PhysicsEngine instance
             * @param {number} state.interpolation - Interpolation factor [0, 1)
             * @param {number} state.time - Current time in ms (performance.now())
             * @param {string} state.gameState - Current game state string
             */
            render(state) {
                const ctx = this.ctx;
                const {
                    ghosty,
                    wallManager,
                    cloudSystem,
                    particleSystem,
                    effectsManager,
                    scoreManager,
                    physics,
                    interpolation,
                    time,
                    gameState
                } = state;

                // Apply screen shake offset if active
                this.renderEffects(effectsManager);

                // 1. Background
                this.renderBackground(ctx);

                // 2. Clouds
                this.renderClouds(cloudSystem);

                // 3. Walls (batched rendering via WallManager)
                this.renderWalls(wallManager);

                // 4. Score bubbles between wall gaps
                if (wallManager) {
                    this.renderScoreBubbles(wallManager.getActiveWalls());
                }

                // 5. Ghosty
                if (ghosty) {
                    this.renderGhosty(ghosty, interpolation, physics, time);
                }

                // 6. Particles (batched)
                this.renderParticles(particleSystem);

                // 7. Popups (score popups)
                this.renderPopups(effectsManager);

                // 8. HUD - in-game score display
                if (scoreManager) {
                    this.renderHUD(scoreManager.currentScore, gameState);

                    // Score bar at bottom
                    this.renderScoreDisplay(
                        scoreManager.currentScore,
                        scoreManager.highScore,
                        scoreManager.isNewRecord,
                        scoreManager.newRecordFlashTimer
                    );
                }

                // 9. State-specific overlays
                if (gameState === GameState.Menu) {
                    const highScore = scoreManager ? scoreManager.highScore : 0;
                    this.renderMenuScreen(highScore, ghosty ? ghosty.bobOffset : 0);
                } else if (gameState === GameState.Ready) {
                    this.renderReadyScreen();
                } else if (gameState === GameState.Paused) {
                    this.renderPauseOverlay();
                } else if (gameState === GameState.Game_Over) {
                    this.renderGameOverScreen(
                        scoreManager ? scoreManager.currentScore : 0,
                        scoreManager ? scoreManager.highScore : 0
                    );
                }

                // Reset any transforms applied by screen shake
                if (effectsManager && effectsManager.shake && effectsManager.shake.active) {
                    ctx.setTransform(1, 0, 0, 1, 0, 0);
                }
            }

            /**
             * Render the background fill color.
             * @param {CanvasRenderingContext2D} ctx
             */
            renderBackground(ctx) {
                ctx.fillStyle = GAME_CONFIG.canvas.backgroundColor;
                ctx.fillRect(0, 0, this.canvasWidth, this.canvasHeight);
            }

            /**
             * Render clouds via the CloudSystem's own render method.
             * @param {object|null} cloudSystem - CloudSystem instance
             */
            renderClouds(cloudSystem) {
                if (cloudSystem) {
                    cloudSystem.render(this.ctx);
                }
            }

            /**
             * Render walls via the WallManager's batched render method.
             * WallManager.render() already batches: all bodies first, then all caps.
             * @param {object|null} wallManager - WallManager instance
             */
            renderWalls(wallManager) {
                if (wallManager) {
                    wallManager.render(this.ctx);
                }
            }

            /**
             * Render score bubbles as small white rounded rects in wall gap centers.
             * @param {Array} walls - Array of active wall pair objects
             */
            renderScoreBubbles(walls) {
                if (!walls || walls.length === 0) return;

                const ctx = this.ctx;

                for (let i = 0; i < walls.length; i++) {
                    const wall = walls[i];
                    if (wall.scored) continue; // Don't show bubble for already-scored walls

                    const bubbleX = wall.x + wall.width / 2;
                    const bubbleY = wall.gapCenterY;
                    const bubbleW = 40;
                    const bubbleH = 40;

                    const x = bubbleX - bubbleW / 2;
                    const y = bubbleY - bubbleH / 2;

                    if (this.coinSpriteLoaded && this.coinSprite) {
                        ctx.drawImage(this.coinSprite, x, y, bubbleW, bubbleH);
                    } else {
                        // Fallback rounded rect
                        const radius = 4;
                        ctx.fillStyle = '#FFFFFF';
                        ctx.beginPath();
                        ctx.moveTo(x + radius, y);
                        ctx.lineTo(x + bubbleW - radius, y);
                        ctx.quadraticCurveTo(x + bubbleW, y, x + bubbleW, y + radius);
                        ctx.lineTo(x + bubbleW, y + bubbleH - radius);
                        ctx.quadraticCurveTo(x + bubbleW, y + bubbleH, x + bubbleW - radius, y + bubbleH);
                        ctx.lineTo(x + radius, y + bubbleH);
                        ctx.quadraticCurveTo(x, y + bubbleH, x, y + bubbleH - radius);
                        ctx.lineTo(x, y + radius);
                        ctx.quadraticCurveTo(x, y, x + radius, y);
                        ctx.closePath();
                        ctx.fill();
                    }
                }
            }

            /**
             * Render Ghosty using its own render method with interpolation.
             * @param {object} ghosty - Ghosty instance
             * @param {number} interpolation - Interpolation factor [0, 1)
             * @param {object} physics - PhysicsEngine instance
             * @param {number} time - Current time in ms
             */
            renderGhosty(ghosty, interpolation, physics, time) {
                if (ghosty && ghosty.render) {
                    ghosty.render(this.ctx, interpolation, physics, time);
                }
            }

            /**
             * Render particles with batched fillStyle.
             * Sets fillStyle to white once, then only changes globalAlpha per particle.
             * Avoids ctx.save()/ctx.restore() in the loop.
             * @param {object|null} particleSystem - ParticleSystem instance
             */
            renderParticles(particleSystem) {
                if (!particleSystem) return;

                const particles = particleSystem.getActiveParticles();
                if (particles.length === 0) return;

                const ctx = this.ctx;

                // BATCHED: set fillStyle once for all particles
                ctx.fillStyle = GAME_CONFIG.particles.color;

                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    if (!p.active || p.opacity <= 0) continue;

                    // Only change globalAlpha per particle (no save/restore)
                    ctx.globalAlpha = p.opacity;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Restore globalAlpha after batch
                ctx.globalAlpha = 1.0;
            }

            /**
             * Render score popups ("+1" floating text) from the effects manager.
             * @param {object|null} effectsManager - EffectsManager instance
             */
            renderPopups(effectsManager) {
                if (!effectsManager || !effectsManager.popups || effectsManager.popups.length === 0) return;

                const ctx = this.ctx;
                const popups = effectsManager.popups;

                // Batch: set font once for all popups
                ctx.font = 'bold 16px monospace';
                ctx.fillStyle = '#FFFFFF';

                for (let i = 0; i < popups.length; i++) {
                    const popup = popups[i];
                    if (popup.opacity <= 0) continue;

                    ctx.globalAlpha = popup.opacity;
                    ctx.fillText('+1', popup.x, popup.y - popup.offsetY);
                }

                // Restore globalAlpha
                ctx.globalAlpha = 1.0;
            }

            /**
             * Render the in-game HUD: large semi-transparent score centered in upper canvas.
             * Only visible during Playing state.
             * @param {number} score - Current score
             * @param {string} gameState - Current game state
             */
            renderHUD(score, gameState) {
                if (gameState !== GameState.Playing) return;

                const ctx = this.ctx;

                ctx.globalAlpha = this.config.hudScoreOpacity;
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 64px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(score.toString(), this.canvasWidth / 2, this.canvasHeight * 0.2);

                // Restore state
                ctx.globalAlpha = 1.0;
                ctx.textAlign = 'start';
                ctx.textBaseline = 'alphabetic';
            }

            /**
             * Render the Menu screen overlay: title, high score, input instructions.
             * Ghosty bobbing is already handled by renderGhosty (uses ghosty.bobOffset).
             * Requirements: 1.4, 1.5, 1.6, 1.7
             * @param {number} highScore - Persisted high score value
             * @param {number} bobOffset - Current bob offset (unused for text, kept for interface)
             */
            renderMenuScreen(highScore, bobOffset) {
                const ctx = this.ctx;
                const centerX = this.canvasWidth / 2;

                // Title "Flappy Kiro" centered in upper quarter
                const titleY = this.canvasHeight / 4;

                // Draw title with dark shadow/outline for readability
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = 'bold 36px monospace';

                // Shadow/outline (dark)
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillText('Flappy Kiro', centerX + 2, titleY + 2);

                // Main title text (white)
                ctx.fillStyle = '#FFFFFF';
                ctx.fillText('Flappy Kiro', centerX, titleY);

                // High score below title
                ctx.font = '18px monospace';
                ctx.fillStyle = '#FFD700';
                ctx.fillText(`High Score: ${highScore}`, centerX, titleY + 45);

                // --- Instruction Menu Box ---
                const boxWidth = 300;
                const boxHeight = 110;
                const boxX = centerX - boxWidth / 2;
                const boxY = titleY + 80;
                
                // Semi-transparent background box
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(boxX, boxY, boxWidth, boxHeight);
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 2;
                ctx.strokeRect(boxX, boxY, boxWidth, boxHeight);

                // Instructions Text
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 16px monospace';
                ctx.fillText('CONTROLS', centerX, boxY + 25);
                
                ctx.font = '14px monospace';
                ctx.textAlign = 'left';
                const textX = boxX + 20;
                let textY = boxY + 60;
                const lineHeight = 24;

                ctx.fillText('SPACE / CLICK : Flap / Jump', textX, textY);
                textY += lineHeight;
                ctx.fillText('P / ESC       : Pause', textX, textY);

                // Start prompt
                ctx.textAlign = 'center';
                ctx.fillStyle = '#00FF00'; // Greenish prompt
                ctx.font = 'bold 16px monospace';
                ctx.fillText('Press Space or Click to Start', centerX, boxY + boxHeight + 35);

                // Restore text alignment
                ctx.textAlign = 'start';
                ctx.textBaseline = 'alphabetic';
            }

            /**
             * Render the score display bar at the bottom of the canvas.
             * Shows "Score: X | High: Y" in a dark bar.
             * If new record and flash timer active, use gold color.
             * @param {number} score - Current score
             * @param {number} highScore - High score
             * @param {boolean} isNewRecord - Whether current score is a new record
             * @param {number} flashTimer - Remaining flash duration in ms
             */
            renderScoreDisplay(score, highScore, isNewRecord, flashTimer) {
                const ctx = this.ctx;
                const barHeight = 40;
                const barY = this.canvasHeight - barHeight;

                // Draw dark bottom bar
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, barY, this.canvasWidth, barHeight);

                // Text color: gold if new record flash active, otherwise white
                if (isNewRecord && flashTimer > 0) {
                    ctx.fillStyle = this.config.newRecordFlashColor;
                } else {
                    ctx.fillStyle = '#FFFFFF';
                }

                ctx.font = 'bold 14px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(
                    `Score: ${score} | High: ${highScore}`,
                    this.canvasWidth / 2,
                    barY + barHeight / 2
                );

                // Restore text alignment
                ctx.textAlign = 'start';
                ctx.textBaseline = 'alphabetic';
            }

            /**
             * Apply screen shake and white flash effects.
             * Applies canvas translate offset for screen shake.
             * Draws white flash overlay if active.
             * @param {object|null} effectsManager - EffectsManager instance
             */
            renderEffects(effectsManager) {
                if (!effectsManager) return;

                const ctx = this.ctx;

                // Screen shake: offset the canvas
                if (effectsManager.shake && effectsManager.shake.active) {
                    const shake = effectsManager.shake;
                    const progress = shake.elapsed / shake.duration;
                    const decay = 1 - progress;
                    const offsetX = (Math.random() * 2 - 1) * shake.amplitude * decay;
                    const offsetY = (Math.random() * 2 - 1) * shake.amplitude * decay;
                    ctx.setTransform(1, 0, 0, 1, offsetX, offsetY);
                }

                // White flash overlay
                if (effectsManager.flash && effectsManager.flash.active) {
                    const flash = effectsManager.flash;
                    const progress = flash.elapsed / flash.duration;
                    const opacity = flash.opacity * (1 - progress);
                    if (opacity > 0) {
                        ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                        ctx.fillRect(0, 0, this.canvasWidth, this.canvasHeight);
                    }
                }
            }

            /**
             * Render the Ready screen instructions.
             * Ghosty is already positioned at left-third by the engine.
             * Displays "Press Space or Click to Flap" centered on canvas.
             * Requirements: 1.9, 1.10
             */
            renderReadyScreen() {
                const ctx = this.ctx;
                const centerX = this.canvasWidth / 2;
                const centerY = this.canvasHeight / 2;

                // Instruction text: 18px bold, white with dark stroke
                ctx.font = 'bold 18px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                // Dark stroke for readability
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.lineWidth = 3;
                ctx.strokeText('Press Space or Click to Flap', centerX, centerY);

                // White fill
                ctx.fillStyle = '#FFFFFF';
                ctx.fillText('Press Space or Click to Flap', centerX, centerY);

                // Restore text alignment and line width
                ctx.textAlign = 'start';
                ctx.textBaseline = 'alphabetic';
                ctx.lineWidth = 1;
            }

            /**
             * Render the Pause overlay.
             * Semi-transparent dark overlay with "PAUSED" text and resume instructions.
             * Requirements: 6.3, 6.4
             */
            renderPauseOverlay() {
                const ctx = this.ctx;
                const centerX = this.canvasWidth / 2;
                const centerY = this.canvasHeight / 2;

                // Semi-transparent dark overlay
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, this.canvasWidth, this.canvasHeight);

                // "PAUSED" text - large font, centered
                ctx.font = 'bold 48px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#FFFFFF';
                ctx.fillText('PAUSED', centerX, centerY - 100);

                // --- Instruction Menu Box ---
                const boxWidth = 300;
                const boxHeight = 110;
                const boxX = centerX - boxWidth / 2;
                const boxY = centerY - 20;
                
                // Semi-transparent background box
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(boxX, boxY, boxWidth, boxHeight);
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 2;
                ctx.strokeRect(boxX, boxY, boxWidth, boxHeight);

                // Instructions Text
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 16px monospace';
                ctx.fillText('CONTROLS', centerX, boxY + 25);
                
                ctx.font = '14px monospace';
                ctx.textAlign = 'left';
                const textX = boxX + 20;
                let textY = boxY + 60;
                const lineHeight = 24;

                ctx.fillText('SPACE / CLICK : Flap / Jump', textX, textY);
                textY += lineHeight;
                ctx.fillText('P / ESC       : Resume', textX, textY);

                // Restore text alignment
                ctx.textAlign = 'start';
                ctx.textBaseline = 'alphabetic';
            }

            /**
             * Render the Game Over screen overlay.
             * Shows dark overlay, "GAME OVER", final score, high score, and restart prompt.
             * The 500ms debounce for restart input is handled by GameEngine, not renderer.
             * Requirements: 6.6, 6.7, 6.12
             * @param {number} score - Final score for this session
             * @param {number} highScore - All-time high score
             */
            renderGameOverScreen(score, highScore) {
                const ctx = this.ctx;
                const centerX = this.canvasWidth / 2;
                const centerY = this.canvasHeight / 2;

                // Semi-transparent dark overlay
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, this.canvasWidth, this.canvasHeight);

                // "GAME OVER" title
                ctx.font = 'bold 36px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#FFFFFF';
                ctx.fillText('GAME OVER', centerX, centerY - 60);

                // Final score
                ctx.font = 'bold 24px monospace';
                ctx.fillText(`Score: ${score}`, centerX, centerY);

                // High score
                ctx.font = 'bold 20px monospace';
                ctx.fillText(`High Score: ${highScore}`, centerX, centerY + 40);

                // Restart prompt
                ctx.font = '16px monospace';
                ctx.fillText('Tap to Restart', centerX, centerY + 100);

                // Restore text alignment
                ctx.textAlign = 'start';
                ctx.textBaseline = 'alphabetic';
            }
        }

        // ============================================================
        // Bootstrap - Initialize and Start the Game
        // ============================================================

        const canvas = document.getElementById('gameCanvas');
        const game = new GameEngine(canvas);
        game.init().then(() => {
            game.start();
        });

    </script>
</body>

</html>
